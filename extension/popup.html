<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartSummary</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <img src="icons/icon48.png" alt="SmartSummary" class="logo-icon">
        <h1>SmartSummary</h1>
      </div>
    </header>

    <main>
      <div id="error-banner" class="error-banner hidden"></div>

      <div id="summary-placeholder" class="placeholder">
        <p>Click the button below to get a clear summary of this page.</p>
      </div>

      <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <p>Summarizing...</p>
      </div>

      <div id="summary-content" class="summary-content hidden"></div>

      <button id="summarize-btn" class="btn-primary">
        Summarize this page
      </button>
    </main>

    <footer>
      <div id="status-free" class="status">
        <span id="counter">5/5 free summaries remaining</span>
        <button id="upgrade-btn" class="btn-upgrade">Upgrade to Pro</button>
      </div>
      <div id="status-pro" class="status hidden">
        <span class="pro-badge">PRO</span>
        <span>Unlimited summaries</span>
      </div>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
